services:
  ghost:
    image: ghost:5-alpine
    container_name: ghost
    restart: unless-stopped
    environment:
      url: https://${DOMAIN:-localhost}
      database__client: mysql
      database__connection__host: mysql
      database__connection__user: ${MYSQL_USER:-ghost}
      database__connection__password: ${MYSQL_PASSWORD}
      database__connection__database: ${MYSQL_DATABASE:-ghost}
      mail__transport: ${GHOST_MAIL_TRANSPORT:-Direct}
      mail__from: ${GHOST_MAIL_FROM:-noreply@${DOMAIN:-localhost}}
      mail__options__service: ${GHOST_MAIL_SERVICE:-}
      mail__options__auth__user: ${GHOST_MAIL_USER:-}
      mail__options__auth__pass: ${GHOST_MAIL_PASS:-}
    volumes:
      - ./data/ghost:/var/lib/ghost/content
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ghost-network

  mysql:
    image: mysql:8.0
    container_name: ghost-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ghost}
      MYSQL_USER: ${MYSQL_USER:-ghost}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost-network

  caddy:
    image: caddy:2-alpine
    container_name: ghost-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ghost
    networks:
      - ghost-network

networks:
  ghost-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
